<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>步學吾數</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>步學吾數</h1>
    <nav>
      <button id="nav-home">技能樹</button>
      <button id="nav-dashboard">我的儀表板</button>
    </nav>
  </header>

  <main>
    <section id="view-home" class="view active">
      <div id="skilltree-container" class="skilltree"></div>
    </section>

    <section id="view-quiz" class="view">
      <h2 id="quiz-node-name"></h2>
      <span id="quiz-streak"></span>
      <div id="quiz-progressbar" class="quiz-progressbar"></div>
      <div id="quiz-area"></div>
    </section>

    <section id="view-dashboard" class="view">
      <div id="dashboard-content"></div>
    </section>
  </main>

  <div id="tip-bubble-root"></div>

  <script type="module" src="js/app.js"></script>

  <img src="https://visitor-badge.laobi.icu/badge?page_id=hk6429.bxws-math" alt="訪客人數" loading="lazy" style="position:fixed;right:14px;bottom:14px;z-index:2147483000;border-radius:999px;box-shadow:0 2px 10px rgba(0,0,0,.35);">
  <script>window.goatcounter = {path: p => location.host + p}</script>
  <script data-goatcounter="https://hk6429.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
